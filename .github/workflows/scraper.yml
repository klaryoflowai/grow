name: Rabota.md Lead Scanner

on:
  schedule:
    - cron: '0 6 * * 1-5'  # 08:00 EET (UTC+2), luni-vineri
  workflow_dispatch:          # permite rulare manuală din GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Install dependencies
        run: cd scraper && npm ci

      - name: Install Playwright Chromium
        run: cd scraper && npx playwright install chromium --with-deps

      - name: Run scraper
        run: node scraper/index.js
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_LEADS: ${{ secrets.AIRTABLE_TABLE_LEADS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
